<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- 16x16 pixel-art: flag on the green, arcade style -->
  <rect width="16" height="16" fill="#0b3d20"/>
  <!-- sky-ish top band (darker felt) -->
  <rect width="16" height="10" fill="#052e16"/>
  <!-- green mound -->
  <rect x="0" y="10" width="16" height="2" fill="#15803d"/>
  <rect x="0" y="12" width="16" height="4" fill="#16a34a"/>
  <!-- hole -->
  <rect x="9" y="11" width="4" height="1" fill="#04220f"/>
  <!-- flagstick -->
  <rect x="10" y="2" width="1" height="9" fill="#e7e5e4"/>
  <!-- flag -->
  <rect x="11" y="2" width="4" height="1" fill="#ff4444"/>
  <rect x="11" y="3" width="3" height="1" fill="#ff4444"/>
  <rect x="11" y="4" width="2" height="1" fill="#dc2626"/>
  <!-- ball -->
  <rect x="3" y="12" width="2" height="2" fill="#fafaf9"/>
  <rect x="3" y="12" width="1" height="1" fill="#ffffff"/>
  <!-- sparkle pixels -->
  <rect x="2" y="4" width="1" height="1" fill="#7dff66"/>
  <rect x="5" y="7" width="1" height="1" fill="#22c55e"/>
</svg>
